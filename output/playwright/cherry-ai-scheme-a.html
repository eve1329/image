<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>scheme-a mockup</title>
<style>
  :root {
    --bg: #05070d;
    --bg2: #090c16;
    --panel: rgba(12, 14, 21, 0.96);
    --line: rgba(255,255,255,0.08);
    --text: #f5f7fb;
    --muted: #7f8aa5;
    --muted2: #5d667b;
    --accent: #35c9ff;
    --accent2: #8e5bff;
  }
  * { box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; margin: 0; overflow: hidden;
    background:
      radial-gradient(circle at 50% -10%, rgba(37, 120, 255, 0.22), transparent 32%),
      radial-gradient(circle at 82% 18%, rgba(17, 203, 255, 0.10), transparent 26%),
      radial-gradient(circle at 12% 22%, rgba(148, 71, 255, 0.08), transparent 28%),
      linear-gradient(180deg, #05070d 0%, #060812 56%, #05070d 100%);
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Hiragino Sans GB", "Segoe UI", sans-serif;
    color: var(--text);
  }
  .frame {
    position: relative;
    width: 1438px;
    height: 610px;
    overflow: hidden;
    background:
      linear-gradient(180deg, rgba(9,13,21,0.45), rgba(9,13,21,0.18)),
      radial-gradient(circle at 50% 14%, rgba(12, 58, 92, 0.22), transparent 35%),
      linear-gradient(180deg, #05070d 0%, #060913 100%);
  }
  .grid {
    position: absolute; inset: 0;
    background-image:
      linear-gradient(rgba(130, 152, 190, 0.09) 1px, transparent 1px),
      linear-gradient(90deg, rgba(130, 152, 190, 0.09) 1px, transparent 1px),
      radial-gradient(circle at 1px 1px, rgba(154, 174, 203, 0.22) 1px, transparent 0);
    background-size: 48px 48px, 48px 48px, 48px 48px;
    mask-image: linear-gradient(180deg, rgba(0,0,0,0.72) 0%, rgba(0,0,0,0.40) 48%, rgba(0,0,0,0.85) 100%);
    opacity: 0.88;
  }
  .glow {
    position: absolute;
    pointer-events: none;
    filter: blur(24px);
    opacity: 0.95;
  }
  .glow.left {
    width: 360px; height: 240px; left: -80px; top: 22px;
    background: radial-gradient(circle, rgba(41, 147, 255, 0.20) 0%, rgba(41, 147, 255, 0.08) 28%, transparent 72%);
  }
  .glow.right {
    width: 420px; height: 300px; right: 120px; top: 14px;
    background: radial-gradient(circle, rgba(45, 203, 255, 0.22) 0%, rgba(45, 203, 255, 0.10) 25%, transparent 72%);
  }
  .board {
    position: relative;
    display: flex;
    gap: 0;
    padding: 18px 22px 0;
  }
  .card {
    position: relative;
    width: 695px;
    height: 430px;
    overflow: hidden;
    border-radius: 28px;
    background: linear-gradient(180deg, rgba(10, 12, 18, 0.99) 0%, rgba(7, 9, 13, 0.99) 100%);
    border: 1px solid rgba(255,255,255,0.08);
  }
  .card + .card {
    margin-left: 0px;
  }
  .card.selected {
    margin-left: -24px;
    margin-top: 0px;
    z-index: 2;
    border-color: rgba(53, 201, 255, 0.58);
    box-shadow: 0 0 0 1px rgba(53, 201, 255, 0.32), 0 24px 90px rgba(0,0,0,0.45), 0 0 44px rgba(53, 201, 255, 0.12);
  }
  .card::before {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(circle at 20% 0%, rgba(65, 169, 255, 0.08), transparent 30%);
    pointer-events: none;
  }
  .card-header {
    height: 100px;
    padding: 18px 16px 16px 18px;
    border-bottom: 1px solid rgba(255,255,255,0.12);
    background: linear-gradient(180deg, rgba(255,255,255,0.01), rgba(255,255,255,0));
  }
  .status-row {
    display: flex; align-items: center; gap: 14px;
    color: #c9d0df; font-size: 14px; font-weight: 600;
    letter-spacing: 0.11em;
  }
  .status-text span { letter-spacing: 0.2em; }
  .checkbox {
    width: 34px; height: 34px; border-radius: 12px;
    display: grid; place-items: center;
    border: 1px solid rgba(255,255,255,0.10);
    background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.92);
    box-shadow: inset 0 0 0 1px rgba(255,255,255,0.02);
    font-size: 18px; line-height: 1;
  }
  .checkbox.checked {
    background: linear-gradient(180deg, #3f7dff, #1d5cff);
    color: white;
  }
  .title-row {
    display: flex; align-items: center; gap: 12px;
    margin-top: 12px;
  }
  .accent-bar {
    width: 5px; height: 38px; border-radius: 999px;
    background: linear-gradient(180deg, #56d2ff 0%, #6b7bff 50%, #b15cff 100%);
    box-shadow: 0 0 18px rgba(80, 200, 255, 0.35);
  }
  .title { font-size: 20px; font-weight: 800; letter-spacing: 0.01em; color: white; }
  .subtitle { margin-top: 2px; font-size: 16px; color: #8d9ab4; letter-spacing: 0.01em; }
  .card-body {
    display: grid; grid-template-columns: 1fr 1px 1.16fr;
    height: calc(100% - 100px);
  }
  .rail, .matrix { padding: 18px 16px 16px 18px; }
  .divider { width: 1px; background: rgba(255,255,255,0.12); }
  .label-row {
    display: flex; align-items: center; justify-content: space-between; gap: 12px;
    color: #7d8da7; font-size: 12px; letter-spacing: 0.32em; font-weight: 500;
  }
  .pill {
    padding: 7px 12px; border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.06);
    color: #c5cedf; font-size: 13px; letter-spacing: 0;
  }
  .prompt {
    margin-top: 18px;
    color: white; font-size: 18px; font-weight: 700; line-height: 1.48;
    max-width: 270px;
    white-space: pre-wrap;
  }
  .input-label {
    margin-top: 16px;
    color: #6e7b94; font-size: 12px; letter-spacing: 0.22em;
  }
  .empty-input {
    margin-top: 10px;
    width: 188px;
    border-radius: 18px;
    border: 1px dashed rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.02);
    color: #7b8597;
    padding: 12px 14px;
    font-size: 13px;
  }
  .meta-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 8px;
    margin-top: 22px; max-width: 286px;
  }
  .meta-box {
    min-height: 60px; border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.16);
    background: rgba(255,255,255,0.04);
    padding: 11px 14px 10px;
  }
  .meta-k {
    color: #6f7c92; font-size: 12px; letter-spacing: 0.18em; margin-bottom: 7px;
  }
  .meta-v { font-size: 18px; color: white; font-weight: 600; }
  .matrix { padding-left: 14px; }
  .thumb-wrap {
    position: relative;
    margin-top: 20px;
    width: 206px; height: 206px;
    border: 3px solid #ff2d49;
    border-radius: 0;
    background: #0d1117;
    overflow: hidden;
    box-shadow: 0 10px 20px rgba(0,0,0,0.35);
  }
  .thumb {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .index-chip {
    position: absolute; left: 8px; top: 8px; z-index: 2;
    width: 26px; height: 26px; border-radius: 50%;
    display: grid; place-items: center;
    background: rgba(16, 16, 23, 0.95);
    color: white; font-size: 14px; font-weight: 600;
    box-shadow: 0 0 0 1px rgba(255,255,255,0.08);
  }
  .ratio-chip {
    position: absolute; left: 8px; bottom: 8px; z-index: 2;
    padding: 4px 7px; border-radius: 7px;
    background: rgba(7, 7, 12, 0.72); color: white; font-size: 12px;
  }
  .chip-row {
    display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
    margin-top: 14px;
  }
  .mini-chip {
    height: 32px; padding: 0 12px; border-radius: 999px;
    display: inline-flex; align-items: center;
    border: 1px solid rgba(255,255,255,0.10);
    background: rgba(255,255,255,0.05);
    color: #c0cadc; font-size: 13px;
  }
  .empty-space {
    position: absolute; left: 0; right: 0; bottom: 0; top: 470px;
    background: linear-gradient(180deg, rgba(3,4,8,0) 0%, rgba(3,4,8,0.26) 22%, rgba(2,3,7,0.58) 100%);
  }
  .side-notch {
    position: absolute; top: 186px; width: 10px; height: 26px;
    background: linear-gradient(180deg, rgba(53,201,255,0.95), rgba(53,201,255,0.46));
    border-radius: 0 999px 999px 0;
    filter: blur(0.1px);
  }
  .side-notch.left { left: 0; }
  .side-notch.right { right: 0; transform: scaleX(-1); }
</style>
</head>
<body>
  <div class="frame">
    <div class="grid"></div>
    <div class="glow left"></div>
    <div class="glow right"></div>
    <div class="board">
      
      <section class="card  border-white/10 shadow-[0_24px_90px_rgba(0,0,0,0.42)]">
